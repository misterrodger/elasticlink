name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm after CI passes'
        required: false
        type: boolean
        default: false
      npm_tag:
        description: 'npm dist-tag (latest or beta)'
        required: false
        type: choice
        options:
          - latest
          - beta
        default: beta

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:9.3.0
        env:
          discovery.type: single-node
          xpack.security.enabled: false
        options: >-
          --health-cmd "curl http://localhost:9200/_cluster/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 9200:9200

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit dependencies
        if: matrix.node-version == '24.x'
        run: npm run audit

      - name: Check for unused dependencies
        if: matrix.node-version == '24.x'
        run: npm run depcheck

      - name: Check for duplicate code
        if: matrix.node-version == '24.x'
        run: npm run jscpd

      - name: Check dependency licenses
        if: matrix.node-version == '24.x'
        run: npm run license-check

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:coverage

      - name: Integration tests
        run: npm run test:integration

      - name: Upload coverage
        uses: codecov/codecov-action@v5.5.2
        if: matrix.node-version == '24.x'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish)

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Determine npm tag
        id: tag
        run: |
          # workflow_dispatch: use the chosen tag; push-to-main: auto-detect from version
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$(node -p "require('./package.json').version")"
            if echo "$VERSION" | grep -q "beta" && [ "${{ inputs.npm_tag }}" = "latest" ]; then
              echo "::error::Refusing to publish beta version $VERSION with 'latest' dist-tag"
              exit 1
            fi
            echo "npm_tag=${{ inputs.npm_tag }}" >> $GITHUB_OUTPUT
          else
            VERSION="$(node -p "require('./package.json').version")"
            if echo "$VERSION" | grep -q "beta"; then
              echo "npm_tag=beta" >> $GITHUB_OUTPUT
            else
              echo "npm_tag=latest" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Publish to npm
        run: npm publish --tag ${{ steps.tag.outputs.npm_tag }} --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish)
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Detect prerelease
        id: tag
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          if echo "$VERSION" | grep -q "beta"; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: v${{ steps.pkg.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.tag.outputs.prerelease == 'true' }}
